name: Build Client

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        required: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: [self-hosted, Windows, X64]
            artifact: NemeDraft.exe
            asset_name: NemeDraft-Windows-x64
          - os: [self-hosted, Linux, X64]
            artifact: NemeDraft
            asset_name: NemeDraft-Linux-x64
          - os: macos-14
            artifact: NemeDraft
            asset_name: NemeDraft-macOS-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies (Linux, github-hosted only)
        if: runner.os == 'Linux' && runner.environment == 'github-hosted'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libxkbcommon0 libdbus-1-3 libxcb-cursor0 \
            libxcb-icccm4 libxcb-keysyms1 libxcb-shape0

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[client]"

      - name: Build executable
        run: python scripts/build_overlay.py --clean

      - name: Package macOS .app bundle
        if: runner.os == 'macOS'
        working-directory: dist
        run: |
          if [ -d "NemeDraft.app" ]; then
            zip -r NemeDraft.app.zip NemeDraft.app
          fi

      - name: Upload artefact
        if: runner.os != 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

      - name: Upload macOS .app bundle
        if: runner.os == 'macOS' && hashFiles('dist/NemeDraft.app.zip') != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}-app
          path: dist/NemeDraft.app.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout (full history for git-cliff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: artefacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artefacts/*/; do
            name=$(basename "$dir")
            for file in "$dir"*; do
              [ -f "$file" ] || continue
              base=$(basename "$file")
              ext=""
              case "$base" in
                *.exe) ext=".exe" ;;
                *.zip) ext=".zip" ;;
              esac
              case "$name" in
                *"$ext") cp "$file" "release/${name}" ;;
                *) cp "$file" "release/${name}${ext}" ;;
              esac
            done
          done
          ls -la release/

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --latest --strip all
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: NemeDraft ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          target_commitish: main
          body_path: CHANGELOG.md
          files: release/*

      - name: Announce on Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK:-}" ]; then
            echo "DISCORD_WEBHOOK secret not set; skipping Discord announcement."
            exit 0
          fi
          body=$(gh release view "$TAG" --repo "$REPO" --json body -q .body)
          # Embed description caps at 4096 chars on Discord
          truncated=$(printf '%s' "$body" | head -c 3800)
          url="https://github.com/${REPO}/releases/tag/${TAG}"
          payload=$(jq -n \
            --arg content "**NemeDraft ${TAG} released** — ${url}" \
            --arg title "Changelog ${TAG}" \
            --arg desc "$truncated" \
            --arg url "$url" \
            '{content:$content, embeds:[{title:$title, description:$desc, url:$url}]}')
          curl -sS -H "Content-Type: application/json" -X POST -d "$payload" "$DISCORD_WEBHOOK"
