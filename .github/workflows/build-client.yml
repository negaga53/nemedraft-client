name: Build Client

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        required: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: NemeDraft.exe
            asset_name: NemeDraft-Windows-x64
          - os: ubuntu-22.04
            artifact: NemeDraft
            asset_name: NemeDraft-Linux-x64
          - os: macos-14
            artifact: NemeDraft
            asset_name: NemeDraft-macOS-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libxkbcommon0 libdbus-1-3 libxcb-cursor0 \
            libxcb-icccm4 libxcb-keysyms1 libxcb-shape0

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[client]"

      - name: Build executable
        run: python scripts/build_overlay.py --clean

      - name: Package macOS .app bundle
        if: runner.os == 'macOS'
        working-directory: dist
        run: |
          if [ -d "NemeDraft.app" ]; then
            zip -r NemeDraft.app.zip NemeDraft.app
          fi

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

      - name: Upload macOS .app bundle
        if: runner.os == 'macOS' && hashFiles('dist/NemeDraft.app.zip') != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}-app
          path: dist/NemeDraft.app.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: artefacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artefacts/*/; do
            name=$(basename "$dir")
            for file in "$dir"*; do
              [ -f "$file" ] || continue
              base=$(basename "$file")
              ext=""
              case "$base" in
                *.exe) ext=".exe" ;;
                *.zip) ext=".zip" ;;
              esac
              case "$name" in
                *"$ext") cp "$file" "release/${name}" ;;
                *) cp "$file" "release/${name}${ext}" ;;
              esac
            done
          done
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: NemeDraft ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          target_commitish: main
          body: "Release ${{ github.ref_name }}"
          files: release/*
